<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HL Топ Трейдери</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;padding:20px 14px;min-height:100vh}
.wrap{max-width:820px;margin:0 auto}
.header{margin-bottom:20px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#a855f7;box-shadow:0 0 8px #a855f7;display:inline-block;margin-right:8px}
.live-label{color:#64748b;font-size:10px;letter-spacing:2px;text-transform:uppercase}
h1{font-size:22px;font-weight:800;margin-top:6px}
.updated{color:#64748b;font-size:10px;margin-top:3px}
.status{color:#7c3aed;font-size:10px;margin-left:8px}
.periods{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.period-btn{background:#111118;color:#64748b;border:1px solid #1e1e2e;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s}
.period-btn.active{background:#7c3aed;color:#fff;border-color:#7c3aed}
.refresh-btn{margin-left:auto;background:transparent;color:#a855f7;border:1px solid #1e1e2e;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
.refresh-btn:disabled{color:#64748b;cursor:not-allowed}
.spinner{display:flex;flex-direction:column;align-items:center;gap:12px;padding:50px}
.spin{width:34px;height:34px;border:3px solid #1e1e2e;border-top:3px solid #a855f7;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-label{color:#64748b;font-size:12px}
.error-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:16px;color:#ef4444;font-size:13px;text-align:center}
.retry-btn{margin-top:12px;background:#7c3aed;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer;font-weight:600}
.consensus{background:#111118;border:1px solid #1e1e2e;border-radius:12px;padding:16px;margin-bottom:16px}
.consensus-title{color:#64748b;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.coins{display:flex;flex-wrap:wrap;gap:7px}
.coin-card{background:#0a0a0f;border-radius:8px;padding:7px 11px}
.coin-name{font-weight:700;font-size:13px}
.coin-sides{display:flex;gap:6px;font-size:11px;margin-top:3px}
.long{color:#22c55e}
.short{color:#ef4444}
.traders{display:flex;flex-direction:column;gap:8px}
.trader-card{background:#111118;border:1px solid #1e1e2e;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.2s}
.trader-card.open{border-color:#7c3aed}
.trader-header{display:flex;align-items:center;gap:10px;padding:12px 14px}
.rank-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;color:#fff;flex-shrink:0}
.trader-info{flex:1;min-width:0}
.trader-addr{font-weight:600;font-size:11px;font-family:monospace}
.trader-pos{color:#64748b;font-size:10px;margin-top:1px}
.trader-pnl{text-align:right;margin-right:6px}
.pnl-label{font-size:10px;color:#64748b}
.pnl-val{font-weight:700;font-size:13px}
.pnl-pos{color:#22c55e}
.pnl-neg{color:#ef4444}
.arrow{color:#64748b;font-size:13px;transition:transform 0.2s;flex-shrink:0}
.arrow.open{color:#a855f7;transform:rotate(180deg)}
.positions{border-top:1px solid #1e1e2e}
.pos-header{display:grid;grid-template-columns:1fr 65px 75px 80px 80px;padding:7px 14px;color:#64748b;font-size:9px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid #1e1e2e}
.pos-row{display:grid;grid-template-columns:1fr 65px 75px 80px 80px;padding:9px 14px;align-items:center;border-bottom:1px solid #1e1e2e}
.pos-row:last-child{border-bottom:none}
.pos-coin{font-weight:700;font-size:13px}
.side-badge{border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700;text-transform:uppercase}
.side-long{background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
.side-short{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.pos-size{font-size:12px}
.pos-entry{color:#64748b;font-size:11px;font-family:monospace}
.empty-pos{padding:14px 16px;color:#64748b;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <span class="live-dot"></span>
      <span class="live-label">Hyperliquid · Live</span>
      <span class="status" id="status"></span>
    </div>
    <h1>Топ 20 трейдерів</h1>
    <div class="updated" id="updated"></div>
  </div>

  <div class="periods">
    <button class="period-btn" data-period="day">День</button>
    <button class="period-btn" data-period="week">Тиждень</button>
    <button class="period-btn" data-period="month">Місяць</button>
    <button class="period-btn active" data-period="allTime">Весь час</button>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchData()">↻</button>
  </div>

  <div id="app"></div>
</div>

<script>
let currentPeriod = 'allTime';
let traders = [];

const periodFields = {
  day: 'pnlDay', week: 'pnlWeek', month: 'pnlMonth', allTime: 'pnlAllTime'
};

document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.dataset.period;
    fetchData();
  });
});

function formatUSD(n) {
  if (n == null) return '$0';
  const abs = Math.abs(n);
  if (abs >= 1e6) return `$${(n/1e6).toFixed(2)}M`;
  if (abs >= 1e3) return `$${(n/1e3).toFixed(1)}K`;
  return `$${Number(n).toFixed(0)}`;
}

function shortAddr(a) {
  return a ? `${a.slice(0,6)}…${a.slice(-4)}` : '—';
}

async function hlFetch(body) {
  const r = await fetch('/api/hl', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error('API error ' + r.status);
  return r.json();
}

function setStatus(txt) {
  document.getElementById('status').textContent = txt;
}

function renderConsensus(traders) {
  const map = {};
  traders.forEach(t => (t.positions||[]).forEach(p => {
    if (!map[p.coin]) map[p.coin] = {long:0, short:0};
    map[p.coin][p.side]++;
  }));
  const sorted = Object.entries(map)
    .map(([coin,v]) => ({coin,...v,total:v.long+v.short}))
    .sort((a,b)=>b.total-a.total).slice(0,10);
  if (!sorted.length) return '';
  return `<div class="consensus">
    <div class="consensus-title">🔥 Консенсус — найпопулярніші монети</div>
    <div class="coins">${sorted.map(c=>`
      <div class="coin-card" style="border:1px solid ${c.long>=c.short?'rgba(34,197,94,0.25)':'rgba(239,68,68,0.25)'}">
        <div class="coin-name">${c.coin}</div>
        <div class="coin-sides">
          <span class="long">▲${c.long}</span>
          <span class="short">▼${c.short}</span>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

function rankBg(rank) {
  if (rank===1) return 'linear-gradient(135deg,#f59e0b,#1a1a2e)';
  if (rank===2) return 'linear-gradient(135deg,#94a3b8,#1a1a2e)';
  if (rank===3) return 'linear-gradient(135deg,#cd7f32,#1a1a2e)';
  return 'linear-gradient(135deg,#7c3aed,#1a1a2e)';
}

function renderTraders(traders) {
  return `<div class="traders">${traders.map((t,i)=>{
    const rank = i+1;
    const pnlClass = t.pnl>=0?'pnl-pos':'pnl-neg';
    return `<div class="trader-card" id="card-${i}" onclick="toggleCard(${i})">
      <div class="trader-header">
        <div class="rank-badge" style="background:${rankBg(rank)}">${rank}</div>
        <div class="trader-info">
          <div class="trader-addr">${shortAddr(t.ethAddress)}</div>
          <div class="trader-pos" id="pos-label-${i}">${t.positionsLoaded?(t.positions.length?t.positions.length+' позицій':'нема позицій'):'завантажую…'}</div>
        </div>
        <div class="trader-pnl">
          <div class="pnl-label">PnL</div>
          <div class="pnl-val ${pnlClass}">${t.pnl>=0?'+':''}${formatUSD(t.pnl)}</div>
        </div>
        <div class="arrow" id="arrow-${i}">▾</div>
      </div>
      <div class="positions" id="positions-${i}" style="display:none">
        ${renderPositions(t, i)}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderPositions(t, i) {
  if (!t.positionsLoaded) return `<div class="empty-pos">↻ завантажую позиції…</div>`;
  if (!t.positions.length) return `<div class="empty-pos">Немає відкритих позицій</div>`;
  return `<div class="pos-header"><span>Монета</span><span>Сайд</span><span>Розмір</span><span>Вхід</span><span>PnL</span></div>
    ${t.positions.map(p=>`<div class="pos-row">
      <span class="pos-coin">${p.coin}</span>
      <span class="side-badge ${p.side==='long'?'side-long':'side-short'}">${p.side}</span>
      <span class="pos-size">${formatUSD(p.positionValue)}</span>
      <span class="pos-entry">$${p.entryPx?Number(p.entryPx).toLocaleString('en',{maximumFractionDigits:2}):'—'}</span>
      <span class="pnl-val ${p.unrealizedPnl>=0?'pnl-pos':'pnl-neg'}">${p.unrealizedPnl>=0?'+':''}${formatUSD(p.unrealizedPnl)}</span>
    </div>`).join('')}`;
}

function toggleCard(i) {
  const pos = document.getElementById(`positions-${i}`);
  const arrow = document.getElementById(`arrow-${i}`);
  const card = document.getElementById(`card-${i}`);
  const isOpen = pos.style.display !== 'none';
  pos.style.display = isOpen ? 'none' : 'block';
  arrow.classList.toggle('open', !isOpen);
  card.classList.toggle('open', !isOpen);
}

function updateCardPositions(i) {
  const t = traders[i];
  const posDiv = document.getElementById(`positions-${i}`);
  const label = document.getElementById(`pos-label-${i}`);
  if (posDiv) posDiv.innerHTML = renderPositions(t, i);
  if (label) label.textContent = t.positionsLoaded
    ? (t.positions.length ? t.positions.length+' позицій' : 'нема позицій')
    : 'завантажую…';
}

async function fetchData() {
  const app = document.getElementById('app');
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  setStatus('Завантажую leaderboard…');
  app.innerHTML = `<div class="spinner"><div class="spin"></div><div class="spin-label">Завантажую…</div></div>`;

  try {
    const data = await hlFetch({type:'leaderboard'});
    const rows = data?.leaderboardRows || [];
    if (!rows.length) throw new Error('Порожня відповідь від API');

    const pf = periodFields[currentPeriod];
    traders = [...rows]
      .filter(r=>r[pf]!=null)
      .sort((a,b)=>b[pf]-a[pf])
      .slice(0,20)
      .map(r=>({ethAddress:r.ethAddress, pnl:r[pf], positions:[], positionsLoaded:false}));

    app.innerHTML = renderConsensus(traders) + renderTraders(traders);
    document.getElementById('updated').textContent = new Date().toLocaleTimeString('uk');
    setStatus('↻ підтягую позиції…');

    for (let i=0; i<traders.length; i++) {
      try {
        const d = await hlFetch({type:'clearinghouseState', user:traders[i].ethAddress});
        traders[i].positions = (d?.assetPositions||[])
          .filter(p=>parseFloat(p.position?.szi||0)!==0)
          .map(p=>({
            coin:p.position.coin,
            side:parseFloat(p.position.szi)>0?'long':'short',
            positionValue:Math.abs(parseFloat(p.position.positionValue||0)),
            entryPx:p.position.entryPx,
            unrealizedPnl:parseFloat(p.position.unrealizedPnl||0),
          }));
        traders[i].positionsLoaded = true;
      } catch {
        traders[i].positionsLoaded = true;
      }
      updateCardPositions(i);
      // Update consensus panel
      document.querySelector('.consensus')?.replaceWith?.(
        Object.assign(document.createElement('div'), {innerHTML: renderConsensus(traders)}).firstChild
      );
      await new Promise(r=>setTimeout(r,150));
    }
    setStatus('');
  } catch(e) {
    app.innerHTML = `<div class="error-box">⚠️ ${e.message}<br><button class="retry-btn" onclick="fetchData()">Спробувати ще раз</button></div>`;
    setStatus('');
  }
  btn.disabled = false;
}

fetchData();
</script>
</body>
</html>
